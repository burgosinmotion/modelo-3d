<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modelo 3D</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

model-viewer{
    width:100%;
    height:100%;
    background:#f5f5f5;
}
</style>

</head>

<body>

<model-viewer
    src="modelo.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    touch-action="pan-y">
</model-viewer>

</body>
</html>
